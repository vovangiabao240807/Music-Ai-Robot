<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neko AI v2.7 - Groq Llama 4 Vision & Camera Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --bg-color: #0f0f1a;
            --panel-color: #1a1a2e;
            --accent-color: #ff79c6;
            --text-color: #f8f8f2;
            --user-bubble: linear-gradient(135deg, #8ae9fd 0%, #44475a 100%);
            --ai-bubble: #21222c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        header {
            background-color: var(--panel-color);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent-color); display: flex; align-items: center; gap: 10px; text-shadow: 0 0 10px rgba(255,121,198,0.5); }
        .controls { display: flex; gap: 10px; }

        button {
            background-color: #282a36;
            color: white;
            border: 1px solid #44475a;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
        }
        button:hover { background-color: var(--accent-color); color: #0f0f1a; font-weight: bold; }

        /* Chat Container */
        #chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .message { display: flex; flex-direction: column; max-width: 85%; animation: fadeIn 0.25s ease-out; position: relative; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; }
        .message.ai { align-self: flex-start; }

        .bubble { padding: 14px 18px; border-radius: 18px; font-size: 1rem; line-height: 1.6; word-break: break-word; position: relative; }
        .user .bubble { background: var(--user-bubble); color: #0f0f1a; font-weight: 500; border-bottom-right-radius: 4px; padding-right: 40px; }
        .ai .bubble { background: var(--ai-bubble); color: var(--text-color); border-bottom-left-radius: 4px; border: 1px solid #44475a; padding-right: 40px; }

        .chat-img { max-width: 100%; max-height: 250px; border-radius: 10px; margin-bottom: 8px; display: block; border: 1px solid #44475a; }
        .copy-msg-btn { position: absolute; top: 10px; right: 12px; background: transparent; border: none; color: #6272a4; cursor: pointer; font-size: 1rem; padding: 4px; transition: color 0.2s; }
        .user .copy-msg-btn { color: #282a36; }
        .copy-msg-btn:hover { color: var(--accent-color) !important; background: transparent; }

        .bubble pre { background: #191a21; padding: 14px; border-radius: 10px; overflow-x: auto; margin: 12px 0; border: 1px solid #44475a; }
        .bubble code { font-family: 'Fira Code', 'Courier New', Courier, monospace; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; color: #50fa7b; }
        .bubble pre code { background: none; padding: 0; color: inherit; }
        .bubble p { margin-bottom: 10px; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble ul, .bubble ol { margin-left: 20px; margin-bottom: 10px; }

        /* Input Area */
        .input-area { background-color: var(--panel-color); padding: 15px 20px; border-top: 1px solid #44475a; position: relative; }
        .input-wrapper { display: flex; gap: 12px; align-items: flex-end; width: 100%; }

        #preview-container { display: none; position: absolute; bottom: 75px; left: 20px; background: #21222c; padding: 8px; border-radius: 10px; border: 1px solid var(--accent-color); align-items: center; gap: 10px; z-index: 10; }
        #preview-img { max-height: 60px; border-radius: 6px; }
        #remove-preview { color: #ff5555; cursor: pointer; font-size: 1.2rem; }

        textarea { flex: 1; background-color: #282a36; color: var(--text-color); border: 1px solid #44475a; border-radius: 14px; padding: 14px; resize: none; height: 50px; max-height: 150px; font-size: 1rem; outline: none; }
        textarea:focus { border-color: var(--accent-color); box-shadow: 0 0 5px rgba(255,121,198,0.3); }

        .icon-btn { background: #282a36; width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; border: 1px solid #44475a; color: white; transition: all 0.2s; }
        .icon-btn:hover { background: #44475a; border-color: var(--accent-color); }
        
        .file-btn { color: #8ae9fd; }
        .camera-btn { color: #50fa7b; }
        .send-btn { background: var(--accent-color); color: #0f0f1a; border: none; }
        .send-btn:hover { background: #ff92df; transform: scale(1.03); }

        #file-input { display: none; }
        .loading .bubble { background: #21222c; color: #6272a4; font-style: italic; }

        /* Camera Modal Giao Diện Chụp Ảnh */
        #camera-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; flex-direction: column; gap: 15px; }
        #camera-video { width: 90%; max-width: 500px; border-radius: 12px; border: 2px solid var(--accent-color); background: #000; }
        .camera-controls { display: flex; gap: 15px; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-eye"></i> Neko AI v2.7 (Groq Llama 4 Vision)</div>
        <div class="controls">
            <button onclick="clearHistory()"><i class="fa-solid fa-rotate-right"></i> Reset Chat</button>
            <button onclick="updateApiKey()"><i class="fa-solid fa-key"></i> Cài Key Groq</button>
        </div>
    </header>

    <div id="chat-container"></div>

    <div id="camera-modal">
        <video id="camera-video" autoplay playsinline></video>
        <div class="camera-controls">
            <button onclick="capturePhoto()" style="background: #50fa7b; color: #0f0f1a; font-weight: bold;"><i class="fa-solid fa-camera"></i> Chụp Ảnh</button>
            <button onclick="stopCamera()" style="background: #ff5555;"><i class="fa-solid fa-xmark"></i> Hủy</button>
        </div>
    </div>

    <div class="input-area">
        <div id="preview-container">
            <img id="preview-img" src="" alt="Preview">
            <i class="fa-solid fa-circle-xmark" id="remove-preview" onclick="clearImagePreview()"></i>
        </div>

        <div class="input-wrapper">
            <button class="icon-btn file-btn" onclick="document.getElementById('file-input').click()" title="Đọc hoặc tải file dữ liệu/hình ảnh"><i class="fa-solid fa-folder-open"></i></button>
            <input type="file" id="file-input" accept="image/*,text/plain,.js,.html,.css,.txt" onchange="handleFileInput(event)">
            
            <button class="icon-btn camera-btn" onclick="startCamera()" title="Chụp ảnh trực tiếp từ camera"><i class="fa-solid fa-camera"></i></button>

            <textarea id="user-input" placeholder="Nhập tin nhắn, chụp ảnh, hoặc tải tài liệu lên đây..."></textarea>
            <button class="icon-btn send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
    <script>
        let API_KEY = localStorage.getItem("groq_api_key");
        let chatHistory = [];
        let selectedImgBase64 = null;
        let selectedImgType = null;
        let videoStream = null;

        const SYSTEM_PROMPT = "Bạn là Neko AI, một trợ lý ảo siêu thông minh, thân thiện. Hãy luôn xưng hô là 'Tớ' hoặc 'Mình' và gọi người dùng là 'bồ' hoặc 'bạn'. Câu trả lời cần ngắn gọn, trực diện, trình bày đẹp bằng Markdown, hỗ trợ viết code chuẩn và vẽ công thức toán lý hóa chính xác bằng ký hiệu $ hoặc $$. Khi nhận được ảnh, hãy tự nhìn hình phân tích và giải thích chi tiết, không cần người dùng bóc chữ.";

        const chatContainer = document.getElementById("chat-container");
        const userInput = document.getElementById("user-input");

        userInput.addEventListener("input", resizeInput);
        userInput.addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        appendMessage("Neko AI v2.Tớ vừa cập nhật rồi nè bồ ơi!", "ai");

        if (!API_KEY) setTimeout(updateApiKey, 500);

        function updateApiKey() {
            const key = prompt("Nhập Groq API Key của bồ vào đây:", API_KEY || "");
            if (key !== null) {
                API_KEY = key.trim();
                localStorage.setItem("groq_api_key", API_KEY);
                alert("Đã lưu API Key Groq mới thành công!");
            }
        }

        function clearHistory() {
            if (confirm("Xóa hết lịch sử chat nha bồ?")) {
                chatHistory = [];
                chatContainer.innerHTML = "";
                appendMessage("Hệ thống đã làm mới! Bắt đầu cuộc trò chuyện mới thôi bồ! ⚡🌸", "ai");
            }
        }

        function resizeInput() {
            userInput.style.height = "50px";
            userInput.style.height = (userInput.scrollHeight) + "px";
        }

        // Xử lý nạp File (Ảnh hoặc File Văn Bản)
        function handleFileInput(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.type.startsWith("image/")) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById("preview-img").src = e.target.result;
                    document.getElementById("preview-container").style.display = "flex";
                    selectedImgBase64 = e.target.result.split(',')[1];
                    selectedImgType = file.type;
                }
                reader.readAsDataURL(file);
            } else {
                const reader = new FileReader();
                reader.onload = function(e) {
                    userInput.value += `\n[Nội dung từ file ${file.name}]:\n${e.target.result}\n`;
                    resizeInput();
                }
                reader.readAsText(file);
            }
        }

        // Bật hệ thống Camera
        async function startCamera() {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                const video = document.getElementById("camera-video");
                video.srcObject = videoStream;
                document.getElementById("camera-modal").style.display = "flex";
            } catch (err) {
                alert("Không thể truy cập camera của bồ. Hãy kiểm tra lại quyền ứng dụng nha!");
            }
        }

        // Tắt Camera
        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }
            document.getElementById("camera-modal").style.display = "none";
        }

        // Chụp hình từ camera
        function capturePhoto() {
            const video = document.getElementById("camera-video");
            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const dataUrl = canvas.toDataURL("image/jpeg");
            document.getElementById("preview-img").src = dataUrl;
            document.getElementById("preview-container").style.display = "flex";
            
            selectedImgBase64 = dataUrl.split(',')[1];
            selectedImgType = "image/jpeg";

            stopCamera();
        }

        function clearImagePreview() {
            document.getElementById("preview-container").style.display = "none";
            document.getElementById("preview-img").src = "";
            document.getElementById("file-input").value = "";
            selectedImgBase64 = null;
            selectedImgType = null;
        }

        function copyToClipboard(text, btnElement) {
            navigator.clipboard.writeText(text).then(() => {
                const icon = btnElement.querySelector("i");
                icon.className = "fa-solid fa-check";
                setTimeout(() => icon.className = "fa-solid fa-copy", 2000);
            });
        }

        function appendMessage(content, sender, imgSrc = null) {
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${sender}`;
            
            let bubbleHtml = `<div class="bubble">`;
            if (imgSrc) {
                bubbleHtml += `<img src="${imgSrc}" class="chat-img" alt="User Upload">`;
            }
            if (sender === "ai") {
                bubbleHtml += marked.parse(content);
            } else {
                bubbleHtml += escapeHtml(content).replace(/\n/g, "<br>");
            }
            bubbleHtml += `<button class="copy-msg-btn" title="Copy text"><i class="fa-solid fa-copy"></i></button></div>`;
            msgDiv.innerHTML = bubbleHtml;

            msgDiv.querySelector(".copy-msg-btn").addEventListener("click", function() {
                copyToClipboard(content, this);
            });

            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            if (sender === "ai") {
                msgDiv.querySelectorAll("pre code").forEach((el) => hljs.highlightElement(el));
                if (window.MathJax?.typesetPromise) window.MathJax.typesetPromise([msgDiv]);
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && !selectedImgBase64) return;
            if (!API_KEY) { alert("Chưa cài Groq Key bồ ơi!"); updateApiKey(); return; }

            const currentImgBase64 = selectedImgBase64;
            const currentImgType = selectedImgType;
            const imgSrcForChat = currentImgBase64 ? `data:${currentImgType};base64,${currentImgBase64}` : null;

            appendMessage(text, "user", imgSrcForChat);
            userInput.value = "";
            clearImagePreview();
            resizeInput();

            const loadingDiv = document.createElement("div");
            loadingDiv.className = "message ai loading";
            loadingDiv.innerHTML = `<div class="bubble">Neko AI đang xử lý dữ liệu... ⚡</div>`;
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            let contentPayload = [];
            if (text) {
                contentPayload.push({ type: "text", text: text });
            } else {
                contentPayload.push({ type: "text", text: "Hãy đọc nội dung bức ảnh này và giải hoặc giải thích chi tiết giúp tôi." });
            }

            if (currentImgBase64) {
                contentPayload.push({
                    type: "image_url",
                    image_url: {
                        url: `data:${currentImgType};base64,${currentImgBase64}`
                    }
                });
            }

            const limitedHistory = chatHistory.slice(-4);
            const messagesToSend = [
                { role: "system", content: SYSTEM_PROMPT },
                ...limitedHistory,
                { role: "user", content: contentPayload }
            ];

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        "model": "meta-llama/llama-4-scout-17b-16e-instruct",
                        "messages": messagesToSend,
                        "temperature": 0.5
                    })
                });

                const data = await response.json();
                chatContainer.removeChild(loadingDiv);

                if (response.ok && data.choices?.[0]) {
                    const aiResponse = data.choices[0].message.content;
                    appendMessage(aiResponse, "ai");
                    
                    chatHistory.push({ role: "user", content: text || "[Gửi một hình ảnh]" });
                    chatHistory.push({ role: "assistant", content: aiResponse });
                } else {
                    const errorMsg = data.error ? data.error.message : JSON.stringify(data);
                    appendMessage(`❌ Lỗi hệ thống: ${errorMsg}`, "ai");
                }
            } catch (error) {
                if (chatContainer.contains(loadingDiv)) chatContainer.removeChild(loadingDiv);
                appendMessage(`❌ Lỗi kết nối: Không thể gửi dữ liệu đến Groq Cloud.`, "ai");
            }
        }
    </script>
</body>
</html>
